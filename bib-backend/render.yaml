services:
  - type: web
    name: bib-backend
    runtime: node
    rootDir: bib-backend
    buildCommand: cp ../CITIES.md . && npm ci && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: OPENROUTER_MODELS
        value: openrouter/owl-alpha
      - key: QUEUE_WORKER_ENABLED
        value: true
      - key: WP_BASE_URL
        sync: false
      - key: WP_SECRET
        sync: false
